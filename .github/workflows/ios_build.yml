name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Cho phép bạn bấm nút build thủ công

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build Shared Framework
        run: ./gradlew :shared:assembleSharedReleaseFramework

      - name: Upload Framework
        uses: actions/upload-artifact@v3
        with:
          name: shared-framework
          path: shared/build/bin/iosArm64/release/shared.framework
